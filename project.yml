name: BixiWidget
options:
  bundleIdPrefix: com.macktr
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM: ""   # set in Xcode via Signing & Capabilities (your Apple ID)

targets:
  # ---- Host app ----
  BixiWidgetApp:
    type: application
    platform: iOS
    sources:
      - BixiWidgetApp
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macktr.BixiWidgetApp
    info:
      path: BixiWidgetApp/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    dependencies:
      - target: BixiWidget

  # ---- Widget extension (embedded into the app) ----
  BixiWidget:
    type: app-extension
    platform: iOS
    sources:
      - BixiWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macktr.BixiWidgetApp.BixiWidget
    info:
      path: BixiWidget/Info.plist
      properties:
        CFBundleDisplayName: BixiWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
